<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>名片分享</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body style="background-color: #1A1A2E; color: white; text-align: center; padding-top: 35vh; font-family: sans-serif;">
  
  <h3 id="status">正在為您開啟好友名單...</h3>

  <script>
    const liffId = "2010103902-wpnEOInb"; 

    async function main() {
      try {
        await liff.init({ liffId: liffId });

        if (!liff.isInClient()) {
          document.getElementById("status").innerText = "⚠️ 請在 LINE 聊天室內開啟此名片！";
          return;
        }

        // 1. 從網址抓取兩張圖片的參數
        const params = new URLSearchParams(window.location.search);
        const name = params.get('name');
        const img1 = params.get('img1');
        const img2 = params.get('img2'); // 可能為 null (如果是單面名片)

        if (!name || !img1) {
          document.getElementById("status").innerText = "❌ 找不到名片資料！";
          return;
        }

        // 2. 組裝未來朋友點擊時要跳轉的 LIFF 網址
        let forwardUrl = "https://liff.line.me/" + liffId + "?name=" + encodeURIComponent(name) + "&img1=" + encodeURIComponent(img1);
        if (img2) {
          forwardUrl += "&img2=" + encodeURIComponent(img2);
        }

        // 3. 建立單一圖卡的輔助函式
        const createCardBubble = (imgUrl) => ({
          "type": "bubble",
          "size": "giga",
          "body": {
            "type": "box",
            "layout": "vertical",
            "paddingAll": "0px",
            "contents": [
              {
                "type": "image",
                "url": imgUrl,
                "size": "full",
                "aspectMode": "cover",
                "aspectRatio": "16:10",
                "gravity": "center",
                "action": {
                  "type": "uri",
                  "uri": forwardUrl
                }
              }
            ]
          }
        });

        // 4. 將正面與背面(如果有)放入陣列
        const bubbles = [createCardBubble(img1)];
        if (img2) bubbles.push(createCardBubble(img2));

        // 5. 組裝為 Carousel 格式
        const flexPayload = {
          "type": "flex",
          "altText": name + " 的雙面專屬名片",
          "contents": {
            "type": "carousel",
            "contents": bubbles
          }
        };

        // 6. 全自動觸發分享
        if (liff.isApiAvailable('shareTargetPicker')) {
          const res = await liff.shareTargetPicker([flexPayload]);
          if (res || !res) liff.closeWindow(); 
        } else {
          document.getElementById("status").innerText = "⚠️ 尚未開啟 Share Target Picker 權限！";
        }

      } catch (err) {
        document.getElementById("status").innerText = "系統錯誤: " + err.message;
      }
    }

    main();
  </script>
</body>
</html>
