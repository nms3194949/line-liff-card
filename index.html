<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>名片分享</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    .share-btn {
      display: none;
      background-color: #06C755; 
      color: white;
      padding: 16px 32px;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      margin-top: 30px;
      cursor: pointer;
      width: 80%;
      font-weight: bold;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.3);
    }
    .share-btn:active { background-color: #05A044; }
  </style>
</head>
<body style="background-color: #1A1A2E; color: white; text-align: center; padding-top: 25vh; font-family: sans-serif;">
  
  <h3 id="status">讀取名片資料中...</h3>
  <button id="shareBtn" class="share-btn" onclick="shareNow()">📤 點擊這裡分享名片</button>

  <script>
    const liffId = "2010103902-wpnEOInb"; 
    let flexPayload = null; 

    async function main() {
      try {
        await liff.init({ liffId: liffId });

        if (!liff.isInClient()) {
          document.getElementById("status").innerText = "⚠️ 請在 LINE 聊天室內開啟！";
          return;
        }

        // 從網址列抓取 GAS 帶過來的參數
        const params = new URLSearchParams(window.location.search);
        const name = params.get('name');
        const imgUrl = params.get('img');

        if (!name || !imgUrl) {
          document.getElementById("status").innerText = "❌ 找不到名片資料！";
          return;
        }

        // 準備分享出去的卡片 (同樣把參數繼續傳遞下去，確保朋友點擊也能分享)
        const forwardUrl = "https://liff.line.me/" + liffId + "?name=" + encodeURIComponent(name) + "&img=" + encodeURIComponent(imgUrl);

        flexPayload = {
          "type": "flex",
          "altText": name + " 的專屬名片",
          "contents": {
            "type": "bubble",
            "size": "giga",
            "body": {
              "type": "box",
              "layout": "vertical",
              "paddingAll": "0px",
              "contents": [
                {
                  "type": "image",
                  "url": imgUrl,
                  "size": "full",
                  "aspectMode": "cover",
                  "aspectRatio": "16:10",
                  "gravity": "center",
                  "action": {
                    "type": "uri",
                    "uri": forwardUrl
                  }
                }
              ]
            }
          }
        };

        document.getElementById("status").innerText = "✨ 名片準備好囉！";
        document.getElementById("shareBtn").style.display = "inline-block";

      } catch (err) {
        document.getElementById("status").innerText = "系統錯誤: " + err.message;
      }
    }

    async function shareNow() {
      try {
        const res = await liff.shareTargetPicker([flexPayload]);
        if (res) liff.closeWindow(); 
      } catch (err) {
        alert("分享失敗，請確認是否開啟 Share Target Picker 權限: " + err.message);
      }
    }

    main();
  </script>
</body>
</html>
