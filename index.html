<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>名片分享</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body style="background-color: #1A1A2E; color: white; text-align: center; padding-top: 35vh; font-family: sans-serif;">
  
  <h3 id="status">正在為您開啟好友名單...</h3>

  <script>
    const liffId = "2010103902-wpnEOInb"; 

    async function main() {
      try {
        // 1. 初始化 LIFF
        await liff.init({ liffId: liffId });

        if (!liff.isInClient()) {
          document.getElementById("status").innerText = "⚠️ 請在 LINE 聊天室內開啟此名片！";
          return;
        }

        // 2. 從網址列抓取 GAS 帶過來的參數 (姓名與圖片網址)
        const params = new URLSearchParams(window.location.search);
        const name = params.get('name');
        const imgUrl = params.get('img');

        if (!name || !imgUrl) {
          document.getElementById("status").innerText = "❌ 找不到名片資料！";
          return;
        }

        // 3. 準備分享出去的卡片
        const forwardUrl = "https://liff.line.me/" + liffId + "?name=" + encodeURIComponent(name) + "&img=" + encodeURIComponent(imgUrl);

        const flexPayload = {
          "type": "flex",
          "altText": name + " 的專屬名片",
          "contents": {
            "type": "bubble",
            "size": "giga",
            "body": {
              "type": "box",
              "layout": "vertical",
              "paddingAll": "0px",
              "contents": [
                {
                  "type": "image",
                  "url": imgUrl,
                  "size": "full",
                  "aspectMode": "cover",
                  "aspectRatio": "16:10",
                  "gravity": "center",
                  "action": {
                    "type": "uri",
                    "uri": forwardUrl
                  }
                }
              ]
            }
          }
        };

        // 4. 無縫全自動觸發！(組裝完立刻呼叫 shareTargetPicker)
        if (liff.isApiAvailable('shareTargetPicker')) {
          const res = await liff.shareTargetPicker([flexPayload]);
          
          // 無論是分享成功或取消，都自動關閉網頁，不留痕跡
          if (res || !res) {
            liff.closeWindow(); 
          }
        } else {
          document.getElementById("status").innerText = "⚠️ 尚未開啟 Share Target Picker 權限！";
        }

      } catch (err) {
        document.getElementById("status").innerText = "系統錯誤: " + err.message;
      }
    }

    // 啟動主程式
    main();
  </script>
</body>
</html>
