<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>名片分享</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body style="background-color: #1A1A2E; color: white; text-align: center; padding-top: 35vh; font-family: sans-serif;">

  <h3 id="status">正在為您驗證名片...</h3>

  <script>
    const liffId = "2010103902-wpnEOInb";
    // GAS 部署 URL（doGet 驗證端點）
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzMva3AAJfWxcnpFC_EiwT7M4tGBJU9rsKkFQ9w1vWeCVgrIje1yToK5o6d4PGDJGvf/exec";

    async function main() {
      try {
        await liff.init({ liffId: liffId });

        if (!liff.isInClient()) {
          document.getElementById("status").innerText = "⚠️ 請在 LINE 聊天室內開啟此名片！";
          return;
        }

        const params = new URLSearchParams(window.location.search);
        const name = params.get('name');
        const img1 = params.get('img1');
        const img2 = params.get('img2');

        if (!name || !img1) {
          document.getElementById("status").innerText = "❌ 找不到名片資料！";
          return;
        }

        // ── 後端驗證：確認期限與身份 ──
        const userId = liff.getContext().userId;
        const verifyUrl = GAS_URL + "?api=verify&name=" + encodeURIComponent(name) + "&userId=" + encodeURIComponent(userId);
        const verifyRes = await fetch(verifyUrl);
        const verifyData = await verifyRes.json();

        if (!verifyData.valid) {
          document.getElementById("status").innerText = verifyData.message || "⏰ 名片已過期，請洽專人開通。";
          return;
        }

        // ── 驗證通過，組裝名片 ──
        let forwardUrl = "https://liff.line.me/" + liffId + "?name=" + encodeURIComponent(name) + "&img1=" + encodeURIComponent(img1);
        if (img2) forwardUrl += "&img2=" + encodeURIComponent(img2);

        const createCardBubble = (imgUrl) => ({
          "type": "bubble",
          "size": "giga",
          "body": {
            "type": "box",
            "layout": "vertical",
            "paddingAll": "0px",
            "contents": [
              {
                "type": "image",
                "url": imgUrl,
                "size": "full",
                "aspectMode": "cover",
                "aspectRatio": "16:10",
                "gravity": "center",
                "action": {
                  "type": "uri",
                  "uri": forwardUrl
                }
              }
            ]
          }
        });

        const bubbles = [createCardBubble(img1)];
        if (img2) bubbles.push(createCardBubble(img2));

        const flexPayload = {
          "type": "flex",
          "altText": name + " 的雙面專屬名片",
          "contents": {
            "type": "carousel",
            "contents": bubbles
          }
        };

        if (liff.isApiAvailable('shareTargetPicker')) {
          const res = await liff.shareTargetPicker([flexPayload]);
          if (res || !res) liff.closeWindow();
        } else {
          document.getElementById("status").innerText = "⚠️ 尚未開啟 Share Target Picker 權限！";
        }

      } catch (err) {
        document.getElementById("status").innerText = "系統錯誤: " + err.message;
      }
    }

    main();
  </script>
</body>
</html>
